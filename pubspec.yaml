name: leaf_flutter
description: Leaf PDF to text reader.
publish_to: 'none'
version: 0.2.0-alpha+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.0
  go_router: ^16.0.0
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.39
  path_provider: ^2.1.5
  path: ^1.9.1
  dio: ^5.9.0
  file_picker: ^10.3.3
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  intl: ^0.20.2
  url_launcher: ^6.3.2
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.18.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
hooks:
  user_defines:
    sqlite3:
      source: system

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "iconmain.png"
